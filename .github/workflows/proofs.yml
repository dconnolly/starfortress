name: Check ProofFrog proofs

on:
  push:
    paths:
      - 'proof/prooffrog/**'
  pull_request:
    paths:
      - 'proof/prooffrog/**'

jobs:
  check-proofs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install ProofFrog
        run: pip install -r proof/prooffrog/requirements.txt

      - name: Check proofs
        working-directory: proof/prooffrog
        run: make
